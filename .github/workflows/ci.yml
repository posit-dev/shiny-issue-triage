name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    # Do not run repository code from outside contributors or forks.
    #
    # A pull_request whose head branch lives in this repository (not a fork)
    # can only be created by someone with write access -- outside contributors
    # must work from a fork, which fails the head-repo check below. That makes
    # the same-repo check the real trust boundary.
    #
    # We deliberately do NOT gate on github.event.pull_request.author_association:
    # the webhook payload only reflects *public* org membership, so maintainers
    # with private org membership are reported as COLLABORATOR/CONTRIBUTOR rather
    # than MEMBER and would be incorrectly skipped.
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.13'

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 📦 Install the project
        run: uv sync

      - name: 📐 Check formatting and lint
        run: make py-check-format

      - name: 📝 Check types
        run: make py-check-types

      - name: 🧪 Run Python tests
        run: make py-check-tests

      - name: 🧾 Validate triage YAML
        run: make validate-yaml

      - name: 🐍 Compile triage scripts
        run: make compile-scripts

      - name: 🟨 Run Node checks
        run: make js-check
