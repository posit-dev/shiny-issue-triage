name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    # Do not run repository code from outside contributors or forks.
    #
    # A pull_request whose head branch lives in this repository (not a fork)
    # can only be created by someone with write access -- outside contributors
    # must work from a fork, which fails the head-repo check below. That makes
    # the same-repo check the real trust boundary.
    #
    # We deliberately do NOT gate on github.event.pull_request.author_association:
    # the webhook payload only reflects *public* org membership, so maintainers
    # with private org membership are reported as COLLABORATOR/CONTRIBUTOR rather
    # than MEMBER and would be incorrectly skipped.
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate YAML
        run: python .github/triage/scripts/validate-yaml.py

      - name: Run Python checks
        run: |
          python -m py_compile \
            .github/triage/scripts/resolve-repositories.py \
            .github/triage/scripts/resolve-label-specs.py \
            .github/triage/scripts/check-engine-guardrails.py
          python -m unittest tests.test_resolve_label_specs -v

      - name: Run Node checks
        run: |
          node --check .github/triage/scripts/create-github-app-token-map.mjs
          node --check .github/triage/scripts/gh-token-router.mjs
          node --check .github/triage/scripts/gh-aw-output-adapter.mjs
          node --check .github/triage/scripts/dry-run-triage-actions.mjs
          node --check .github/triage/scripts/process-triage-actions.mjs
          node --test tests/test_process_triage_actions.mjs tests/test_gh_token_router.mjs tests/test_gh_aw_output_adapter.mjs tests/test_dry_run_triage_actions.mjs
