name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.13'

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: 📦 Install the project
        run: uv sync

      - name: 📐 Check formatting and lint
        run: make py-check-format

      - name: 📝 Check types
        run: make py-check-types

      - name: 🧪 Run Python tests
        run: make py-check-tests

      - name: 🧾 Validate triage YAML
        run: make validate-yaml

      - name: 🐍 Compile triage scripts
        run: make compile-scripts

      - name: 🟨 Run Node checks
        run: make js-check
