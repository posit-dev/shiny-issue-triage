name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    # Do not run repository code from outside contributors or forks.
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association)
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate YAML
        run: python .github/triage/scripts/validate-yaml.py

      - name: Run Python checks
        run: |
          python -m py_compile \
            .github/triage/scripts/resolve-repositories.py \
            .github/triage/scripts/resolve-label-specs.py \
            .github/triage/scripts/check-engine-guardrails.py
          python -m unittest tests.test_resolve_label_specs -v

      - name: Run Node checks
        run: |
          node --check .github/triage/scripts/create-github-app-token-map.mjs
          node --check .github/triage/scripts/gh-token-router.mjs
          node --check .github/triage/scripts/process-triage-actions.mjs
          node --test tests/test_process_triage_actions.mjs tests/test_gh_token_router.mjs
