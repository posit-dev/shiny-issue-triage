classification:
  - name: regression
    confidence: high
    requirement: Evidence that current or development behavior differs materially from an older released version.
  - name: duplicate
    confidence: high
    requirement: Linked candidate duplicate and short rationale.
  - name: wrong location
    confidence: medium
    requirement: Target repository or upstream location and reason.
  - name: needs reprex
    confidence: medium
    requirement: Missing runnable minimal code, app, data, or steps.
  - name: needs clarification
    confidence: medium
    requirement: Missing a specific expected behavior, environment detail, screenshot, log, or scope decision.

priority:
  - name: "Priority: Critical"
    color: C90000
    rank: 100
    meaning: Production-breaking, security-sensitive, data loss, or severe release blocker.
    human_review: true
  - name: "Priority: High"
    color: E63700
    rank: 75
    meaning: High-confidence regression or severe bug affecting many users or current release work.
  - name: "Priority: Medium"
    color: FFCC00
    rank: 50
    meaning: Valid bug or well-defined request with moderate impact or a workaround.
  - name: "Priority: Low"
    color: 008A08
    rank: 25
    meaning: Low-impact bug, docs polish, papercut, or unclear low-severity request.

review:
  - ai-triage:needs-review
  - ai-triage:accepted
  - ai-triage:corrected
  - ai-triage:bad-label
  - ai-triage:bad-comment
  - ai-triage:done

reporting:
  - ai-generated-issue

workflow:
  - name: ai-triage:fix-requested
    color: 5319E7
    meaning: A maintainer asked an AI agent to attempt a draft-PR fix (Tier 2).
  - name: ai-triage:needs-reprex
    color: 6A1B9A
    meaning: A maintainer asked an AI agent to attempt a minimal reprex and comment it on the issue.
  - name: ai-triage:no-reprex
    color: B39DDB
    meaning: The reprex agent could not reproduce the issue; needs human review (never auto-closed).

allowed_safe_output_labels:
  - regression
  - duplicate
  - wrong location
  - needs reprex
  - needs clarification
  - "Priority: Critical"
  - "Priority: High"
  - "Priority: Medium"
  - "Priority: Low"
  - ai-triage:needs-review
  - ai-triage:accepted
  - ai-triage:corrected
  - ai-triage:bad-label
  - ai-triage:bad-comment
  - ai-triage:done
